<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:#111827;
    padding:30px;
    width:350px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="card">
<h4 class="text-white mb-3">Signup</h4>

<form method="post">
{% csrf_token %}
<input name="username" class="form-control mb-2" placeholder="Username">
<input name="email" class="form-control mb-2" placeholder="Email">
<input name="password" type="password" class="form-control mb-2" placeholder="Password">
<input name="confirm" type="password" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-primary w-100">Signup</button>
</form>

<div class="mt-3 text-center">
<a href="{% url 'login' %}" class="text-light">Already have account?</a>
</div>

</div>

</body>
</html>
