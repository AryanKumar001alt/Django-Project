<!DOCTYPE html>
<html>
<head>
<title>Exam Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#0b1220;
    color:#e5e7eb;
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:#020617;
    padding:20px;
}

.sidebar h4 { color:#3b82f6; }

.sidebar a {
    display:block;
    padding:10px;
    color:#94a3b8;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover {
    background:#1f2937;
    color:#fff;
}

/* Main */
.main { margin-left:220px; }

/* Topbar */
.topbar {
    background:#020617;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #1f2937;
}

/* Card */
.card {
    background:#111827;
    border-radius:12px;
    padding:20px;
    border:1px solid #1f2937;
}

/* Stats */
.stat { font-size:26px; font-weight:600; }

/* Table */
.table {
    color:#e5e7eb;
    border-radius:12px;
    overflow:hidden;
}

.table thead {
    background:#1f2937;
}

.table tbody tr {
    transition:0.2s;
}

.table tbody tr:hover {
    background:#1e293b;
}

/* Inputs */
input, textarea, select {
    background:#020617 !important;
    border:1px solid #1f2937 !important;
    color:#e5e7eb !important;
}

/* Buttons */
.btn { border-radius:8px; }

.btn-primary { background:#3b82f6; border:none; }
.btn-success { background:#22c55e; }
.btn-danger { background:#ef4444; }
.btn-dark { background:#1f2937; }

/* Action buttons */
.action-btns .btn {
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Badges */
.badge {
    padding:6px 12px;
    border-radius:8px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="sidebar">
<h4>🚀 Portal</h4>

<a href="{% url 'dashboard' %}">Dashboard</a>

{% if not user.is_staff %}
<a href="{% url 'form' %}">Fill Form</a>
{% endif %}

<a href="{% url 'logout' %}">Logout</a>
</div>

<div class="main">

<div class="topbar">
<div>Dashboard</div>
<div>{{ user.username }}</div>
</div>

<div class="p-4">

{% if messages %}
{% for m in messages %}
<div class="alert alert-info">{{ m }}</div>
{% endfor %}
{% endif %}

{% block content %}{% endblock %}

</div>

</div>

</body>
</html>
