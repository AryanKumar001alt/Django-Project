{% extends 'base.html' %}
{% block content %}

<div class="card" style="max-width:600px">

<h4 class="mb-3">
{% if form.instance.pk %}Edit Form{% else %}Fill Form{% endif %}
</h4>

<form method="post">
{% csrf_token %}

{% for field in form %}
<div class="mb-3">
<label class="mb-1">{{ field.label }}</label>
{{ field }}
</div>
{% endfor %}

<button class="btn btn-primary w-100">Submit</button>

</form>

</div>

{% endblock %}
